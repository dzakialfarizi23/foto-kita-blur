<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Filter V-Sign & Kepal</title>
    
    <!-- Import Library MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body { 
            background-color: #111; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }

        button {
            padding: 15px 30px; font-size: 20px; background-color: #3498db; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        /* Container Kamera */
        .video-container { 
            position: relative; width: 640px; height: 480px; 
            border-radius: 8px; overflow: hidden; background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        video { 
            width: 100%; height: 100%; 
            transform: scaleX(-1); /* Efek Cermin */
            object-fit: cover;
            transition: filter 0.3s ease-in-out;
        }

        .blur-active { filter: blur(20px); }
        
        /* Efek Merah untuk Jokowi */
        #red-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: red; opacity: 0.4; display: none; 
            mix-blend-mode: multiply; /* Membaur dengan video seperti OpenCV addWeighted */
        }

        /* Status di Kiri Atas */
        #top-left-status {
            position: absolute; top: 15px; left: 15px; font-size: 20px; font-weight: bold;
            text-shadow: 2px 2px 4px black;
        }

        /* Teks di Tengah */
        #center-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 50px; font-weight: 900; text-align: center; display: none;
            width: 100%;
        }

        /* Style Teks Khusus */
        .text-blur {
            color: white; 
            -webkit-text-stroke: 1.5px black; /* Outline hitam */
            text-shadow: 3px 3px 6px black;
        }
        
        .text-jokowi {
            color: #e74c3c; /* Merah */
            -webkit-text-stroke: 2px white; /* Outline putih */
            text-shadow: 2px 2px 10px white;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>Simulasi Gestur Tangan Berbasis Web</h2>
        <button id="start-btn">Mulai Kamera & AI</button>
    </div>

    <!-- File Audio Persis Sesuai Permintaan -->
    <audio id="audioLagu" src="Sal_Priadi_-_Foto_kita_blur_(mp3.pm).mp3"></audio>
    <audio id="audioJokowi" src="hidup-jokowi.mp3"></audio>

    <div class="video-container">
        <video id="videoElement" autoplay playsinline></video>
        
        <!-- Lapisan Efek Visual -->
        <div id="red-overlay"></div>
        <div id="top-left-status" style="color: #2ecc71;">NORMAL MODE</div>
        <div id="center-text"></div>
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const audioLagu = document.getElementById('audioLagu');
        const audioJokowi = document.getElementById('audioJokowi');
        const redOverlay = document.getElementById('red-overlay');
        const topLeftStatus = document.getElementById('top-left-status');
        const centerText = document.getElementById('center-text');
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');

        let currentState = 'NORMAL';

        // Hilangkan layar awal dan mulai akses kamera
        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            mulaiKamera();
        });

        // Fungsi khusus mengecek 4 jari utama (Telunjuk, Tengah, Manis, Kelingking)
        function checkFingersUp(landmarks) {
            const tipIds = [8, 12, 16, 20]; // Ujung jari
            const pipIds = [6, 10, 14, 18]; // Pangkal sendi
            
            let fingers = [];
            for (let i = 0; i < 4; i++) {
                // Jika Y ujung jari lebih kecil (lebih tinggi di layar) dari sendinya = Jari berdiri
                if (landmarks[tipIds[i]].y < landmarks[pipIds[i]].y) {
                    fingers.push(true);
                } else {
                    fingers.push(false);
                }
            }
            return fingers; // Array: [Telunjuk, Tengah, Manis, Kelingking]
        }

        // Proses AI MediaPipe
        function onResults(results) {
            // Jika tangan tidak terdeteksi
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                setNormalMode();
                return;
            }

            const fingers = checkFingersUp(results.multiHandLandmarks[0]);
            const isIndexUp = fingers[0];
            const isMiddleUp = fingers[1];
            const isRingUp = fingers[2];
            const isPinkyUp = fingers[3];

            // --- LOGIKA V-SIGN (Hanya Telunjuk & Tengah yg naik) ---
            if (isIndexUp && isMiddleUp && !isRingUp && !isPinkyUp) {
                if (currentState !== 'V_SIGN') {
                    currentState = 'V_SIGN';
                    
                    // Audio
                    audioJokowi.pause();
                    audioJokowi.currentTime = 0;
                    audioLagu.play().catch(e => console.log(e));

                    // Visual
                    videoElement.classList.add('blur-active');
                    redOverlay.style.display = 'none';
                    
                    topLeftStatus.innerText = 'V SIGN DETECTED';
                    topLeftStatus.style.color = '#f1c40f'; // Warna Kuning
                    
                    centerText.innerText = 'Foto kita blur';
                    centerText.className = 'text-blur';
                    centerText.style.display = 'block';
                }
            }
            // --- LOGIKA KEPALAN TANGAN (Semua Jari Turun) ---
            else if (!isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp) {
                if (currentState !== 'FIST') {
                    currentState = 'FIST';
                    
                    // Audio
                    audioLagu.pause();
                    audioLagu.currentTime = 0; // Kembalikan lagu blur ke awal jika mau (bisa dihapus kalau mau di-resume)
                    audioJokowi.currentTime = 0;
                    audioJokowi.play().catch(e => console.log(e));

                    // Visual
                    videoElement.classList.remove('blur-active');
                    redOverlay.style.display = 'block';
                    
                    topLeftStatus.innerText = 'FIST DETECTED';
                    topLeftStatus.style.color = '#e74c3c'; // Warna Merah
                    
                    centerText.innerText = 'Hidup Jokowi!!!';
                    centerText.className = 'text-jokowi';
                    centerText.style.display = 'block';
                }
            }
            // --- MODE NORMAL ---
            else {
                setNormalMode();
            }
        }

        function setNormalMode() {
            if (currentState !== 'NORMAL') {
                currentState = 'NORMAL';
                
                // Audio
                audioLagu.pause();
                audioJokowi.pause();
                
                // Visual
                videoElement.classList.remove('blur-active');
                redOverlay.style.display = 'none';
                
                topLeftStatus.innerText = 'NORMAL MODE';
                topLeftStatus.style.color = '#2ecc71'; // Warna Hijau
                
                centerText.style.display = 'none';
            }
        }

        // Inisialisasi AI & Kamera
        function mulaiKamera() {
            const hands = new Hands({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.6
            });
            hands.onResults(onResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            
            camera.start().catch(err => alert("Gagal mengakses kamera sob!"));
        }
    </script>
</body>
</html>
